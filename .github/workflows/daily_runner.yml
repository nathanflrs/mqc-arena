name: Daily Runner

on:
  schedule:
    - cron: '15 13 * * 1-5'   # Mon–Fri 13:15 UTC (market open +45 min)
    - cron: '0 6 * * 1-5'     # Mon–Fri 06:00 UTC (8h00 CEST heure d'été)
    - cron: '15 7 * * 1'      # Mon only 07:15 UTC (tearsheet hebdomadaire)
    - cron: '30 14 * * 1-5'   # Mon–Fri 14:30 UTC (10:30 ET — shadow mode)
    - cron: '0 7 1 * *'      # 1er du mois 07:00 UTC (factsheet mensuelle)
  workflow_dispatch:            # manual trigger from GitHub UI

jobs:
  run:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 13 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arena runner
        env:
          # Broker (IBKR unavailable on CI — runner degrades gracefully)
          IBKR_PORT: ${{ secrets.IBKR_PORT }}
          IBKR_CLIENT_ID: ${{ secrets.IBKR_CLIENT_ID }}
          # Execution guard (keep false on CI — no live orders from GitHub Actions)
          EXECUTION_ENABLED: "false"
          MAX_ORDERS_PER_RUN: ${{ secrets.MAX_ORDERS_PER_RUN }}
          MAX_NOTIONAL_PCT: ${{ secrets.MAX_NOTIONAL_PCT }}
          LIMIT_BUFFER_BPS: ${{ secrets.LIMIT_BUFFER_BPS }}
          # Risk manager
          RISK_MAX_NET_LONG_PCT: ${{ secrets.RISK_MAX_NET_LONG_PCT }}
          RISK_MAX_SINGLE_POSITION_PCT: ${{ secrets.RISK_MAX_SINGLE_POSITION_PCT }}
          RISK_MIN_CASH_PCT: ${{ secrets.RISK_MIN_CASH_PCT }}
          RISK_SELL_ONLY_MODE: ${{ secrets.RISK_SELL_ONLY_MODE }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_APPROVAL_TIMEOUT: ${{ secrets.TELEGRAM_APPROVAL_TIMEOUT }}
          # Misc
          MAX_LEVERAGE: ${{ secrets.MAX_LEVERAGE }}
          MIN_SCORE_THRESHOLD: ${{ secrets.MIN_SCORE_THRESHOLD }}
        run: python -m src.arena.runner

  weekly_tearsheet:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 7 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly tearsheet
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.notify.weekly_tearsheet

  shadow_mode:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 14 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run shadow mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: "true"
        run: python -m src.backtest.shadow_mode

      - name: Commit shadow signals
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/shadow_signals.csv
          git diff --staged --quiet || (git commit -m "chore: shadow signals $(date +%Y-%m-%d)" && git pull --rebase && git push)

  monthly_factsheet:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 1 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send factsheet
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.notify.monthly_factsheet

  morning_briefing:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.notify.morning_briefing
